<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7E2330">
<title>Bella Italia · Cashier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F8EFDC;
  --cream-soft:#FBF6EA;
  --wine:#7E2330;
  --wine-deep:#54141D;
  --basil:#3F6B4F;
  --gold:#CDA434;
  --gold-soft:#ECD8A0;
  --ink:#2F2018;
  --ink-soft:#6E5C4E;
  --shadow:rgba(43,27,20,.18);
  --danger:#B3392C;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:'Nunito Sans',sans-serif;
  color:var(--ink); background:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
button{ font-family:inherit; }

#app{
  position:relative;
  width:100%; max-width:1200px;
  height:100vh; height:100dvh;
  margin:0 auto;
  display:flex; flex-direction:column;
  background:var(--cream);
  overflow:hidden;
  box-shadow:0 0 50px rgba(0,0,0,.35);
}

/* ===================== TOP BAR ===================== */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; background:var(--wine); color:var(--cream);
  box-shadow:0 2px 10px var(--shadow); flex-shrink:0; z-index:5;
}
.brand{ display:flex; align-items:center; gap:10px; font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:800; }
.brand .pos-label{
  font-size:.62rem; font-weight:800; letter-spacing:2px; text-transform:uppercase;
  background:rgba(255,255,255,.16); padding:4px 10px; border-radius:20px;
}
.clock{ text-align:right; line-height:1.25; }
.clock .ctime{ font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:800; }
.clock .cdate{ font-size:.72rem; font-weight:700; color:var(--gold-soft); letter-spacing:.5px; }

/* ===================== VIEWS ===================== */
.content{ flex:1; position:relative; overflow:hidden; }
.view{ position:absolute; inset:0; overflow-y:auto; padding:18px; opacity:0; visibility:hidden; pointer-events:none; }
.view.active{ opacity:1; visibility:visible; pointer-events:auto; }

.view-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.view-title{ font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:800; color:var(--wine); }
.view-sub{ font-size:.85rem; color:var(--ink-soft); font-weight:700; }

/* ===================== TABLES VIEW ===================== */
.tables-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:14px; }
.table-card{
  border-radius:16px; padding:16px; cursor:pointer; min-height:104px;
  display:flex; flex-direction:column; justify-content:space-between;
  box-shadow:0 3px 10px var(--shadow); transition:transform .12s ease;
  border:1px solid rgba(207,164,52,.3);
}
.table-card:active{ transform:scale(.96); }
.table-card.empty{ background:var(--cream-soft); color:var(--ink-soft); }
.table-card.occupied{ background:linear-gradient(160deg, var(--wine) 0%, var(--wine-deep) 100%); color:var(--cream); border-color:var(--gold); }
.table-card .tnum{ font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:800; }
.table-card.empty .tnum{ color:var(--wine); }
.table-card .tstatus{ font-size:.78rem; font-weight:700; margin-top:2px; }
.table-card .ttotal{ font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:800; color:var(--gold-soft); margin-top:6px; }
.table-card .topened{ font-size:.7rem; opacity:.8; margin-top:2px; }

/* ===================== ORDER VIEW ===================== */
#view-order.active{ display:flex; flex-direction:column; padding:0; }
.order-header{
  display:flex; align-items:center; gap:14px; padding:12px 16px;
  background:var(--cream-soft); border-bottom:1px solid rgba(207,164,52,.3);
  flex-shrink:0;
}
.back-btn{
  display:flex; align-items:center; gap:6px; background:var(--wine); color:var(--cream);
  border:none; border-radius:20px; padding:9px 16px; font-weight:800; font-size:.9rem;
  cursor:pointer; flex-shrink:0; transition:background .15s, transform .15s;
}
.back-btn:active{ background:var(--wine-deep); transform:scale(.96); }
.order-header h2{ font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:800; color:var(--wine); flex:1; }
.order-meta{ font-size:.8rem; font-weight:700; color:var(--ink-soft); white-space:nowrap; }

.order-body{ flex:1; display:flex; overflow:hidden; min-height:0; }
.menu-pane{ flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

.cat-tabs{
  display:flex; gap:8px; overflow-x:auto; padding:10px 14px;
  background:var(--cream-soft); border-bottom:1px solid rgba(207,164,52,.25);
  -webkit-overflow-scrolling:touch; scrollbar-width:none; flex-shrink:0;
}
.cat-tabs::-webkit-scrollbar{ display:none; }
.cat-tab{
  flex-shrink:0; display:flex; align-items:center; gap:6px;
  padding:10px 16px; border-radius:20px; border:1px solid rgba(207,164,52,.4);
  background:var(--cream); color:var(--ink-soft); font-size:.9rem; font-weight:800;
  white-space:nowrap; cursor:pointer; transition:background .15s, color .15s, transform .15s;
}
.cat-tab:active{ transform:scale(.95); }
.cat-tab.active{ background:var(--wine); color:var(--cream); border-color:var(--wine); }

.item-grid{
  flex:1; overflow-y:auto; padding:14px; -webkit-overflow-scrolling:touch;
  display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;
  align-content:start;
}
.menu-item-card{
  background:var(--cream-soft); border:1px solid rgba(207,164,52,.3); border-radius:14px;
  padding:14px; min-height:84px; display:flex; flex-direction:column; justify-content:space-between;
  gap:8px; cursor:pointer; transition:transform .12s ease, background .12s ease;
  box-shadow:0 2px 8px var(--shadow);
}
.menu-item-card:active{ transform:scale(.95); background:var(--gold-soft); }
.menu-item-card .iname{ font-weight:800; font-size:.95rem; line-height:1.3; color:var(--ink); }
.menu-item-card .iprice{ font-family:'Playfair Display',serif; font-weight:800; color:var(--wine); font-size:.95rem; }

.order-pane{
  width:340px; flex-shrink:0; display:flex; flex-direction:column;
  background:var(--cream-soft); border-left:1px solid rgba(207,164,52,.3);
}
.order-pane h3{ padding:14px 16px 6px; font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--wine); }
.order-list{ flex:1; overflow-y:auto; padding:0 16px; -webkit-overflow-scrolling:touch; }
.order-row{ display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(207,164,52,.18); }
.order-row .oinfo{ flex:1; min-width:0; }
.order-row .oname{ font-weight:800; font-size:.88rem; line-height:1.3; }
.order-row .oprice{ font-size:.74rem; color:var(--ink-soft); margin-top:2px; }
.qty-controls{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.qty-btn{
  width:32px; height:32px; border-radius:50%; border:1px solid var(--gold); background:var(--cream);
  font-size:1.2rem; font-weight:800; color:var(--wine); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:background .12s, transform .12s; line-height:1;
}
.qty-btn:active{ background:var(--gold-soft); transform:scale(.9); }
.qty-val{ min-width:22px; text-align:center; font-weight:800; font-size:.95rem; }
.line-total{ width:76px; flex-shrink:0; text-align:right; font-weight:800; font-family:'Playfair Display',serif; font-size:.92rem; color:var(--ink); }

.empty-order{ text-align:center; color:var(--ink-soft); padding:40px 16px; font-size:.9rem; line-height:1.6; }

.order-summary{ border-top:2px solid var(--gold); padding:14px 16px; background:var(--cream); flex-shrink:0; }
.summary-row{ display:flex; justify-content:space-between; align-items:center; font-size:.95rem; font-weight:700; padding:3px 0; }
.summary-row.total{ font-size:1.35rem; font-weight:800; font-family:'Playfair Display',serif; color:var(--wine); padding-top:6px; }
.order-actions{ display:flex; gap:8px; margin-top:12px; }
.btn{ flex:1; padding:13px 8px; border-radius:12px; border:none; font-weight:800; font-size:.85rem; cursor:pointer; transition:transform .12s, background .12s, opacity .12s; }
.btn:active{ transform:scale(.97); }
.btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
.btn-primary{ background:var(--wine); color:var(--cream); flex:1.4; }
.btn-primary:active:not(:disabled){ background:var(--wine-deep); }
.btn-secondary{ background:var(--cream); border:1px solid rgba(207,164,52,.5); color:var(--ink); }
.btn-secondary:active:not(:disabled){ background:var(--gold-soft); }

@media (max-width:760px){
  .order-body{ flex-direction:column; }
  .order-pane{ width:100%; max-height:48vh; border-left:none; border-top:1px solid rgba(207,164,52,.3); }
}

/* ===================== HISTORY VIEW ===================== */
.filter-row{ display:flex; gap:8px; }
.filter-btn{
  padding:8px 16px; border-radius:20px; border:1px solid rgba(207,164,52,.4);
  background:var(--cream-soft); color:var(--ink-soft); font-weight:800; font-size:.82rem; cursor:pointer;
  transition:background .15s, color .15s;
}
.filter-btn.active{ background:var(--wine); color:var(--cream); border-color:var(--wine); }
.history-item{
  background:var(--cream-soft); border:1px solid rgba(207,164,52,.28); border-radius:14px;
  padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:background .12s;
}
.history-item:active{ background:var(--gold-soft); }
.hrow1{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
.htable{ font-family:'Playfair Display',serif; font-weight:800; color:var(--wine); font-size:1.05rem; }
.htotal{ font-family:'Playfair Display',serif; font-weight:800; font-size:1.05rem; }
.htime{ font-size:.76rem; color:var(--ink-soft); margin-top:3px; font-weight:700; }
.hitems{
  font-size:.82rem; color:var(--ink-soft); line-height:1.75; max-height:0; overflow:hidden;
  transition:max-height .25s ease, margin-top .25s ease; margin-top:0;
}
.history-item.expanded .hitems{ max-height:400px; margin-top:10px; padding-top:10px; border-top:1px dashed rgba(207,164,52,.4); }

/* ===================== REPORTS VIEW ===================== */
.reports-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:18px; }
.stat-card{ background:var(--cream-soft); border:1px solid rgba(207,164,52,.28); border-radius:16px; padding:16px; }
.stat-card .slabel{ font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-soft); font-weight:800; }
.stat-card .sval{ font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:800; color:var(--wine); margin-top:6px; }
.top-items{ background:var(--cream-soft); border:1px solid rgba(207,164,52,.28); border-radius:16px; padding:16px 18px; margin-bottom:18px; }
.top-items h3{ font-family:'Playfair Display',serif; color:var(--wine); font-size:1.05rem; margin-bottom:8px; }
.top-item-row{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(207,164,52,.18); font-weight:700; font-size:.92rem; }
.top-item-row:last-child{ border-bottom:none; }
.danger-zone{ border:1px solid var(--danger); border-radius:16px; padding:16px 18px; }
.danger-zone h3{ color:var(--danger); font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:6px; }
.danger-zone p{ font-size:.82rem; color:var(--ink-soft); margin-bottom:12px; line-height:1.5; }
.btn-danger{ background:none; border:1px solid var(--danger); color:var(--danger); padding:11px 18px; border-radius:10px; font-weight:800; font-size:.85rem; cursor:pointer; }
.btn-danger:active{ background:rgba(179,57,44,.1); }

/* ===================== BOTTOM NAV ===================== */
.bottom-nav{ display:flex; flex-shrink:0; background:var(--cream-soft); border-top:1px solid rgba(207,164,52,.3); }
.nav-btn{
  flex:1; padding:10px 0 12px; background:none; border:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  color:var(--ink-soft); font-weight:800; font-size:.78rem; transition:color .15s;
}
.nav-btn .nicon{ font-size:1.35rem; }
.nav-btn.active{ color:var(--wine); }

/* ===================== PRINT ===================== */
.print-only{ display:none; }
@media print{
  body > *:not(#printArea){ display:none !important; }
  body{ overflow:visible; background:#fff; }
  #printArea{ display:block !important; font-family:'Courier New', monospace; color:#000; padding:10px; max-width:320px; margin:0 auto; }
  #printArea .pr-title{ text-align:center; font-size:18px; font-weight:bold; }
  #printArea .pr-sub{ text-align:center; font-size:12px; margin-top:2px; }
  #printArea .pr-rule{ border-top:1px dashed #000; border-bottom:1px dashed #000; padding:8px 0; margin:8px 0; }
  #printArea .pr-line{ display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  #printArea .pr-total{ font-size:16px; font-weight:bold; }
  #printArea .pr-footer{ text-align:center; font-size:12px; margin-top:12px; }
}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">🍝 Bella Italia <span class="pos-label">Cashier</span></div>
    <div class="clock">
      <div class="ctime" id="clockTime"></div>
      <div class="cdate" id="clockDate"></div>
    </div>
  </header>

  <div class="content">

    <!-- ===================== TABLES ===================== -->
    <section id="view-tables" class="view active">
      <div class="view-header">
        <div class="view-title">Tables</div>
        <div class="view-sub" id="occupiedCount"></div>
      </div>
      <div class="tables-grid" id="tablesGrid"></div>
    </section>

    <!-- ===================== ORDER ===================== -->
    <section id="view-order" class="view">
      <div class="order-header">
        <button class="back-btn" id="orderBack">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Tables
        </button>
        <h2 id="orderTableTitle">Table 1</h2>
        <div class="order-meta" id="orderMeta"></div>
      </div>
      <div class="order-body">
        <div class="menu-pane">
          <nav class="cat-tabs" id="catTabs"></nav>
          <div class="item-grid" id="itemGrid"></div>
        </div>
        <div class="order-pane">
          <h3>Current Order</h3>
          <div class="order-list" id="orderList"></div>
          <div class="order-summary">
            <div class="summary-row total"><span>Total</span><span id="orderTotal">0 IQD</span></div>
            <div class="order-actions">
              <button class="btn btn-secondary" id="cancelOrderBtn">Cancel</button>
              <button class="btn btn-secondary" id="printBillBtn">Print Bill</button>
              <button class="btn btn-primary" id="checkoutBtn">Checkout</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===================== HISTORY ===================== -->
    <section id="view-history" class="view">
      <div class="view-header">
        <div class="view-title">Order History</div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="today">Today</button>
          <button class="filter-btn" data-filter="all">All</button>
        </div>
      </div>
      <div id="historyList"></div>
    </section>

    <!-- ===================== REPORTS ===================== -->
    <section id="view-reports" class="view">
      <div class="view-header">
        <div class="view-title">Reports</div>
      </div>
      <div class="reports-grid" id="reportsGrid"></div>
      <div class="top-items" id="topItems"></div>
      <div class="danger-zone">
        <h3>Danger Zone</h3>
        <p>Permanently delete all saved order history and reset sales totals. This cannot be undone.</p>
        <button class="btn-danger" id="clearHistoryBtn">Clear All History</button>
      </div>
    </section>

  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="tables"><span class="nicon">🍽️</span>Tables</button>
    <button class="nav-btn" data-view="history"><span class="nicon">🕘</span>History</button>
    <button class="nav-btn" data-view="reports"><span class="nicon">💰</span>Reports</button>
  </nav>

</div>

<div id="printArea" class="print-only"></div>

<script>
/* ===================== MENU DATA ===================== */
const MENU = [
  { cat:'pizza', label:'Pizza', icon:'🍕', items:[
    {key:'pesto', name:'Pesto Pizza', price:10000},
    {key:'mexican', name:'Mexican Pizza', price:9000},
    {key:'meat_pizza', name:'Meat Pizza', price:9000},
    {key:'super_donar', name:'Super Donar Pizza', price:9000},
    {key:'chicken_pizza', name:'Chicken Pizza', price:8000},
    {key:'donar_pizza', name:'Donar Pizza', price:8000},
    {key:'mix', name:'Mix Pizza', price:8000},
    {key:'bella', name:'Bella Italia Pizza', price:8000},
    {key:'tuna', name:'Tuna Pizza', price:7500},
    {key:'qima', name:'Qima Pizza', price:7500},
    {key:'boat', name:'Boat Pizza', price:7500},
    {key:'closed', name:'Closed Pizza', price:7500},
    {key:'margherita', name:'Margherita Pizza', price:6000}
  ]},
  { cat:'donar', label:'Donar', icon:'🌯', items:[
    {key:'bowl_donar', name:'Donar Bowl + Fries', price:7000},
    {key:'bowl_chicken', name:'Chicken Bowl + Fries', price:7000},
    {key:'donar_sandwich', name:'Donar Sandwich', price:6000},
    {key:'chicken_sandwich', name:'Chicken Sandwich', price:6000}
  ]},
  { cat:'burger', label:'Burgers', icon:'🍔', items:[
    {key:'meat_burger', name:'Meat Burger', price:6000},
    {key:'crispy_burger', name:'Kentucky Burger', price:6000}
  ]},
  { cat:'kentucky', label:'Kentucky', icon:'🍗', items:[
    {key:'k5', name:'5 Pcs Kentucky + Salad', price:8000},
    {key:'k3', name:'3 Pcs Kentucky + Fries', price:6000}
  ]},
  { cat:'pasta', label:'Pasta', icon:'🍝', items:[
    {key:'rigatoni', name:'Rigatoni Pasta', price:10000},
    {key:'alfredo', name:'Alfredo Pasta', price:9000},
    {key:'crispy_pasta', name:'Crispy Pasta', price:9000},
    {key:'bolognese', name:'Bolognese Pasta', price:8000}
  ]},
  { cat:'meal', label:'Main Meals', icon:'🍽️', items:[
    {key:'steak', name:'Steak', price:14000},
    {key:'lasagna', name:'Lasagna', price:9000}
  ]},
  { cat:'salad', label:'Salads', icon:'🥗', items:[
    {key:'caesar', name:'Caesar Salad', price:6500},
    {key:'donar_salad', name:'Donar Salad', price:6000},
    {key:'chicken_salad', name:'Chicken Salad', price:6000}
  ]}
];

const TABLE_COUNT = 15;
const TABLES_KEY = 'bellaitalia_cashier_tables_v1';
const HISTORY_KEY = 'bellaitalia_cashier_history_v1';

/* ===================== STORAGE ===================== */
function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}
function saveJSON(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ /* storage unavailable */ }
}

let tables = loadJSON(TABLES_KEY, null);
if(!Array.isArray(tables)){ tables = []; }
while(tables.length < TABLE_COUNT) tables.push({items:[], openedAt:null});
tables = tables.slice(0, TABLE_COUNT);

let history = loadJSON(HISTORY_KEY, []);
if(!Array.isArray(history)) history = [];

let currentTable = null;
let currentCat = MENU[0].cat;
let historyFilter = 'today';

/* ===================== HELPERS ===================== */
function fmt(n){ return Math.round(n).toLocaleString('en-US') + ' IQD'; }
function fmtDateTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('en-US', {month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit'});
}
function fmtTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}
function isToday(iso){
  if(!iso) return false;
  const d = new Date(iso), t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}
function tableTotal(t){ return t.items.reduce((s,i)=>s + i.price*i.qty, 0); }
function tableCount(t){ return t.items.reduce((s,i)=>s + i.qty, 0); }

/* ===================== CLOCK ===================== */
function renderClock(){
  const now = new Date();
  document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}
renderClock();
setInterval(renderClock, 15000);

/* ===================== TABLES VIEW ===================== */
function renderTables(){
  const grid = document.getElementById('tablesGrid');
  let occupied = 0;
  grid.innerHTML = tables.map((t, idx)=>{
    const count = tableCount(t);
    if(count > 0){
      occupied++;
      return '<div class="table-card occupied" data-table="' + idx + '">' +
        '<div class="tnum">Table ' + (idx+1) + '</div>' +
        '<div>' +
          '<div class="tstatus">' + count + ' item' + (count>1?'s':'') + '</div>' +
          '<div class="ttotal">' + fmt(tableTotal(t)) + '</div>' +
          '<div class="topened">Opened ' + fmtTime(t.openedAt) + '</div>' +
        '</div>' +
      '</div>';
    }
    return '<div class="table-card empty" data-table="' + idx + '">' +
      '<div class="tnum">Table ' + (idx+1) + '</div>' +
      '<div class="tstatus">Empty</div>' +
    '</div>';
  }).join('');
  document.getElementById('occupiedCount').textContent = occupied + ' of ' + TABLE_COUNT + ' tables occupied';
}

/* ===================== ORDER VIEW ===================== */
function renderCatTabs(){
  document.getElementById('catTabs').innerHTML = MENU.map(c=>
    '<button class="cat-tab ' + (c.cat===currentCat?'active':'') + '" data-cat="' + c.cat + '">' + c.icon + ' ' + c.label + '</button>'
  ).join('');
}

function renderItemGrid(){
  const cat = MENU.find(c=>c.cat===currentCat);
  document.getElementById('itemGrid').innerHTML = cat.items.map(i=>
    '<div class="menu-item-card" data-key="' + i.key + '" data-price="' + i.price + '">' +
      '<div class="iname">' + i.name + '</div>' +
      '<div class="iprice">' + fmt(i.price) + '</div>' +
    '</div>'
  ).join('');
}

function renderOrderList(){
  const table = tables[currentTable];
  const list = document.getElementById('orderList');
  if(!table.items.length){
    list.innerHTML = '<div class="empty-order">No items yet.<br>Tap a menu item to add it to this table.</div>';
  } else {
    list.innerHTML = table.items.map((i, idx)=>
      '<div class="order-row">' +
        '<div class="oinfo">' +
          '<div class="oname">' + i.name + '</div>' +
          '<div class="oprice">' + fmt(i.price) + ' each</div>' +
        '</div>' +
        '<div class="qty-controls">' +
          '<button class="qty-btn" data-act="dec" data-idx="' + idx + '">\u2212</button>' +
          '<span class="qty-val">' + i.qty + '</span>' +
          '<button class="qty-btn" data-act="inc" data-idx="' + idx + '">+</button>' +
        '</div>' +
        '<div class="line-total">' + fmt(i.price * i.qty) + '</div>' +
      '</div>'
    ).join('');
  }
  const total = tableTotal(table);
  document.getElementById('orderTotal').textContent = fmt(total);
  const disabled = total === 0;
  document.getElementById('checkoutBtn').disabled = disabled;
  document.getElementById('printBillBtn').disabled = disabled;
  document.getElementById('cancelOrderBtn').disabled = disabled;
}

function openOrder(idx){
  currentTable = idx;
  const table = tables[idx];
  document.getElementById('orderTableTitle').textContent = 'Table ' + (idx+1);
  document.getElementById('orderMeta').textContent = table.openedAt ? ('Opened ' + fmtTime(table.openedAt)) : 'New order';
  currentCat = MENU[0].cat;
  renderCatTabs();
  renderItemGrid();
  renderOrderList();
  goToView('order');
}

function addItem(key, price){
  const table = tables[currentTable];
  let cat, item;
  for(let i=0;i<MENU.length;i++){
    const found = MENU[i].items.find(it=>it.key===key);
    if(found){ item = found; break; }
  }
  if(!item) return;
  if(!table.openedAt) table.openedAt = new Date().toISOString();
  const existing = table.items.find(i=>i.key===key);
  if(existing) existing.qty++;
  else table.items.push({key:item.key, name:item.name, price:item.price, qty:1});
  saveJSON(TABLES_KEY, tables);
  renderOrderList();
}

function changeQty(idx, delta){
  const table = tables[currentTable];
  const item = table.items[idx];
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) table.items.splice(idx, 1);
  if(!table.items.length) table.openedAt = null;
  saveJSON(TABLES_KEY, tables);
  renderOrderList();
}

function cancelOrder(){
  if(tableTotal(tables[currentTable]) === 0) return;
  if(!confirm('Cancel this order and clear Table ' + (currentTable+1) + '? This will not be saved to history.')) return;
  tables[currentTable] = {items:[], openedAt:null};
  saveJSON(TABLES_KEY, tables);
  goToView('tables');
}

function checkoutOrder(){
  const table = tables[currentTable];
  const total = tableTotal(table);
  if(total === 0) return;
  if(!confirm('Complete order for Table ' + (currentTable+1) + '\nTotal: ' + fmt(total) + '\n\nMark as paid and clear the table?')) return;
  const order = {
    id: Date.now(),
    table: currentTable + 1,
    items: table.items.map(i=>({key:i.key, name:i.name, price:i.price, qty:i.qty})),
    total: total,
    closedAt: new Date().toISOString()
  };
  history.unshift(order);
  saveJSON(HISTORY_KEY, history);
  tables[currentTable] = {items:[], openedAt:null};
  saveJSON(TABLES_KEY, tables);
  printReceipt(order, true);
  goToView('tables');
}

/* ===================== PRINTING ===================== */
function printReceipt(order, isFinal){
  const area = document.getElementById('printArea');
  const dateStr = order.closedAt ? fmtDateTime(order.closedAt) : fmtDateTime(new Date().toISOString());
  let rows = '';
  order.items.forEach(i=>{
    rows += '<div class="pr-line"><span>' + i.qty + ' x ' + i.name + '</span><span>' + fmt(i.price*i.qty) + '</span></div>';
  });
  area.innerHTML =
    '<div class="pr-title">Bella Italia</div>' +
    '<div class="pr-sub">' + (isFinal ? 'RECEIPT' : 'BILL (PREVIEW)') + '</div>' +
    '<div class="pr-sub">Table ' + order.table + ' &middot; ' + dateStr + '</div>' +
    '<div class="pr-rule">' + rows + '</div>' +
    '<div class="pr-line pr-total"><span>TOTAL</span><span>' + fmt(order.total) + '</span></div>' +
    '<div class="pr-footer">Thank you for dining with us!</div>';
  setTimeout(function(){ window.print(); }, 50);
}

function printCurrentOrder(){
  const table = tables[currentTable];
  const total = tableTotal(table);
  if(total === 0) return;
  printReceipt({
    table: currentTable + 1,
    items: table.items,
    total: total,
    closedAt: null
  }, false);
}

/* ===================== HISTORY VIEW ===================== */
function renderHistory(){
  const list = document.getElementById('historyList');
  const filtered = historyFilter === 'today' ? history.filter(o=>isToday(o.closedAt)) : history;
  if(!filtered.length){
    list.innerHTML = '<div class="empty-order">No orders ' + (historyFilter==='today' ? 'completed today yet.' : 'recorded yet.') + '</div>';
    return;
  }
  list.innerHTML = filtered.map(o=>{
    let itemsHtml = o.items.map(i=> i.qty + ' x ' + i.name + ' &mdash; ' + fmt(i.price*i.qty)).join('<br>');
    return '<div class="history-item" data-id="' + o.id + '">' +
      '<div class="hrow1">' +
        '<span class="htable">Table ' + o.table + '</span>' +
        '<span class="htotal">' + fmt(o.total) + '</span>' +
      '</div>' +
      '<div class="htime">' + fmtDateTime(o.closedAt) + '</div>' +
      '<div class="hitems">' + itemsHtml + '</div>' +
    '</div>';
  }).join('');
}

/* ===================== REPORTS VIEW ===================== */
function renderReports(){
  const todayOrders = history.filter(o=>isToday(o.closedAt));
  const todayTotal = todayOrders.reduce((s,o)=>s+o.total, 0);
  const allTotal = history.reduce((s,o)=>s+o.total, 0);
  const occupied = tables.filter(t=>t.items.length>0).length;
  const avg = todayOrders.length ? Math.round(todayTotal/todayOrders.length) : 0;

  document.getElementById('reportsGrid').innerHTML =
    statCard('Today\'s Sales', fmt(todayTotal)) +
    statCard('Today\'s Orders', String(todayOrders.length)) +
    statCard('Avg Order (Today)', fmt(avg)) +
    statCard('All-Time Sales', fmt(allTotal)) +
    statCard('All-Time Orders', String(history.length)) +
    statCard('Active Tables', occupied + ' / ' + TABLE_COUNT);

  const counts = {};
  todayOrders.forEach(o=>o.items.forEach(i=>{ counts[i.name] = (counts[i.name]||0) + i.qty; }));
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topEl = document.getElementById('topItems');
  if(sorted.length){
    topEl.innerHTML = '<h3>Top Sellers Today</h3>' + sorted.map(([name,qty])=>
      '<div class="top-item-row"><span>' + name + '</span><span>' + qty + ' sold</span></div>'
    ).join('');
  } else {
    topEl.innerHTML = '<h3>Top Sellers Today</h3><div class="empty-order">No sales recorded yet today.</div>';
  }
}
function statCard(label, val){
  return '<div class="stat-card"><div class="slabel">' + label + '</div><div class="sval">' + val + '</div></div>';
}

function clearHistory(){
  if(!confirm('This will permanently delete ALL saved order history and reset sales totals. Continue?')) return;
  if(!confirm('Are you absolutely sure? This cannot be undone.')) return;
  history = [];
  saveJSON(HISTORY_KEY, history);
  renderHistory();
  renderReports();
}

/* ===================== NAVIGATION ===================== */
function goToView(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.view === view));
  if(view === 'tables') renderTables();
  if(view === 'history') renderHistory();
  if(view === 'reports') renderReports();
}

/* ===================== EVENT LISTENERS ===================== */
document.getElementById('tablesGrid').addEventListener('click', function(e){
  const card = e.target.closest('.table-card');
  if(card) openOrder(parseInt(card.dataset.table, 10));
});

document.getElementById('orderBack').addEventListener('click', function(){ goToView('tables'); });

document.getElementById('catTabs').addEventListener('click', function(e){
  const tab = e.target.closest('.cat-tab');
  if(tab){ currentCat = tab.dataset.cat; renderCatTabs(); renderItemGrid(); }
});

document.getElementById('itemGrid').addEventListener('click', function(e){
  const card = e.target.closest('.menu-item-card');
  if(card) addItem(card.dataset.key, parseInt(card.dataset.price, 10));
});

document.getElementById('orderList').addEventListener('click', function(e){
  const btn = e.target.closest('.qty-btn');
  if(btn) changeQty(parseInt(btn.dataset.idx, 10), btn.dataset.act === 'inc' ? 1 : -1);
});

document.getElementById('cancelOrderBtn').addEventListener('click', cancelOrder);
document.getElementById('checkoutBtn').addEventListener('click', checkoutOrder);
document.getElementById('printBillBtn').addEventListener('click', printCurrentOrder);

document.querySelectorAll('.nav-btn').forEach(b=>{
  b.addEventListener('click', function(){ goToView(b.dataset.view); });
});

document.querySelectorAll('.filter-btn').forEach(b=>{
  b.addEventListener('click', function(){
    historyFilter = b.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.toggle('active', x===b));
    renderHistory();
  });
});

document.getElementById('historyList').addEventListener('click', function(e){
  const item = e.target.closest('.history-item');
  if(item) item.classList.toggle('expanded');
});

document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);

/* ===================== INIT ===================== */
renderTables();
</script>
</body>
</html>
